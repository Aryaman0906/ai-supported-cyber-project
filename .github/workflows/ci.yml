name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run Gmail bot tests
        run: |
          python -m pytest tests/test_gmail_bot.py -q

      - name: Run dataset builder tests
        run: |
          python -m pytest tests/test_dataset_builder.py -q

      - name: Run phase completion check
        run: |
          python tests/phase_completion_check.py

      - name: Run cloud Gmail bot readiness check
        run: |
          python tests/cloud_gmail_bot_check.py